# Render blueprint for the PUBLIC hosted deployment of My Cosmos.
# See DEPLOY.md for the full setup walkthrough (private data repo + token).
services:
  - type: web
    name: my-cosmos
    runtime: node
    # Starter ($7/mo): no spin-down, so the demo is always warm (no ~1 min cold
    # start). Switch to `free` to accept spin-down at $0. Data lives in GitHub
    # either way, since both plans have ephemeral disk.
    plan: starter
    # node-pty / ws are optionalDependencies (local in-app terminal only) —
    # skip them so the build needs no native compilation.
    buildCommand: npm install --omit=optional
    startCommand: node scripts/server.js
    healthCheckPath: /api/health
    envVars:
      - key: MY_COSMOS_PUBLIC
        value: "1"
      # Private GitHub repo that durably stores user data (free tier disk is
      # ephemeral). Set both in the Render dashboard — never commit the token.
      - key: MY_COSMOS_GH_REPO # e.g. yourname/my-cosmos-data (PRIVATE repo)
        sync: false
      - key: MY_COSMOS_GH_TOKEN # fine-grained PAT, Contents read/write on that repo only
        sync: false
      - key: MY_COSMOS_GH_BRANCH
        value: main
      # Email verification (Resend). When MY_COSMOS_RESEND_KEY is set in PUBLIC
      # mode, new accounts must confirm their email before they can sign in.
      # Get a key at resend.com; the test sender onboarding@resend.dev works
      # immediately (swap MY_COSMOS_MAIL_FROM for a verified domain later).
      - key: MY_COSMOS_RESEND_KEY # Resend API key — set in dashboard, never commit
        sync: false
      - key: MY_COSMOS_MAIL_FROM
        value: My Cosmos <onboarding@resend.dev>
      # Base URL used to build verification links. Render injects RENDER_EXTERNAL_URL
      # automatically; set MY_COSMOS_PUBLIC_URL only to override (e.g. a custom domain).
      - key: MY_COSMOS_PUBLIC_URL
        sync: false
      # ── Two-tier storage / invite PINs ──
      # PIN_COUNT invite PINs are generated on first boot (stored in the private
      # data repo). A user who redeems a PIN gets persistent cloud storage up to
      # MAX_USER_MB; everyone else runs browser-only (ephemeral). ADMIN_TOKEN
      # protects GET /api/admin/pins (the PIN → account usage registry).
      - key: MY_COSMOS_PIN_COUNT
        value: "50"
      - key: MY_COSMOS_MAX_USER_MB
        value: "50"
      - key: MY_COSMOS_ADMIN_TOKEN # random secret — set in dashboard, never commit
        sync: false
